apis:
  - aid: formassembly:formassembly-api
    name: FormAssembly REST API
    description: REST API for managing FormAssembly forms, responses, themes, connectors, and account data. Supports JSON, XML, CSV, and ZIP response formats. OAuth2 authentication is required for all requests. Endpoints vary by deployment edition including Developer Sandbox, FormAssembly.com cloud, and self-hosted Enterprise instances.
